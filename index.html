<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eGFR 多版本计算工具</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#4e73df,#1cc88a);
    font-family:"Segoe UI",Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:#fff;
    width:420px;
    padding:30px;
    border-radius:16px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

label{
    font-size:14px;
    color:#555;
    margin-top:15px;
    display:block;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:6px;
    border-radius:8px;
    border:1px solid #ccc;
    transition:0.3s;
    font-size:14px;
}

input:focus,select:focus{
    border-color:#4e73df;
    outline:none;
    box-shadow:0 0 6px rgba(78,115,223,0.3);
}

button{
    width:100%;
    margin-top:25px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#4e73df,#1cc88a);
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    opacity:0.9;
    transform:translateY(-2px);
}

.result{
    margin-top:25px;
    background:#f8f9fc;
    padding:15px;
    border-radius:10px;
    font-size:14px;
    line-height:1.8;
    border-left:5px solid #4e73df;
}

.highlight{
    font-size:16px;
    font-weight:bold;
    color:#1cc88a;
}
</style>
</head>

<body>

<div class="card">
<h2>eGFR 计算工具<br>(2009 & 2021)</h2>

<label>性别</label>
<select id="sex">
    <option value="male">男</option>
    <option value="female">女</option>
</select>

<label>年龄（岁）</label>
<input type="number" id="age" placeholder="请输入年龄">

<label>肌酐（μmol/L）</label>
<input type="number" id="scr" placeholder="请输入肌酐数值">

<button onclick="calculate()">开始计算</button>

<div class="result" id="output"></div>
</div>

<script>
function stage(egfr){
    if(egfr>=90) return "G1 正常或高";
    if(egfr>=60) return "G2 轻度下降";
    if(egfr>=45) return "G3a 轻中度下降";
    if(egfr>=30) return "G3b 中重度下降";
    if(egfr>=15) return "G4 重度下降";
    return "G5 肾衰竭";
}

function calculate(){
    var sex=document.getElementById("sex").value;
    var age=parseFloat(document.getElementById("age").value);
    var scr_umol=parseFloat(document.getElementById("scr").value);

    if(!age || !scr_umol){
        document.getElementById("output").innerHTML="请完整填写信息";
        return;
    }

    var scr=scr_umol/88.4;

    // 2009
    var k2009=(sex=="male")?0.9:0.7;
    var a2009=(sex=="male")?-0.411:-0.329;
    var f2009=(sex=="female")?1.018:1;
    var r2009=scr/k2009;
    var egfr2009=141*
        Math.pow(Math.min(r2009,1),a2009)*
        Math.pow(Math.max(r2009,1),-1.209)*
        Math.pow(0.993,age)*
        f2009;

    // 2021
    var k2021=(sex=="male")?0.9:0.7;
    var a2021=(sex=="male")?-0.302:-0.241;
    var f2021=(sex=="female")?1.012:1;
    var r2021=scr/k2021;
    var egfr2021=142*
        Math.pow(Math.min(r2021,1),a2021)*
        Math.pow(Math.max(r2021,1),-1.2)*
        Math.pow(0.9938,age)*
        f2021;

    egfr2009=egfr2009.toFixed(1);
    egfr2021=egfr2021.toFixed(1);
    var diff=(egfr2021-egfr2009).toFixed(1);

    document.getElementById("output").innerHTML=
        "<div><b>CKD-EPI 2009：</b><span class='highlight'>"+egfr2009+
        "</span> mL/min/1.73㎡<br>分期："+stage(egfr2009)+"</div><br>"+
        "<div><b>CKD-EPI 2021：</b><span class='highlight'>"+egfr2021+
        "</span> mL/min/1.73㎡<br>分期："+stage(egfr2021)+"</div><br>"+
        "<div><b>差值 (2021-2009)：</b>"+diff+"</div>";
}
</script>

</body>
</html>
